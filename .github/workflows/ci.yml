name: CI

on:
  push:
    branches: [main, "001-*"]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: false
      - name: go vet
        run: go vet ./...
      - name: go test
        env:
          CGO_ENABLED: "0"
        run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: make lint
        run: make lint

  determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -o bin/my-gather ./cmd/my-gather
      - name: Determinism round-trip
        run: |
          set -euo pipefail
          if [ -d testdata/example2 ]; then
            ./bin/my-gather --out /tmp/a.html --overwrite testdata/example2
            ./bin/my-gather --out /tmp/b.html --overwrite testdata/example2
            # The ONLY legal diff is the GeneratedAt timestamp line:
            # - `diff_lines == 0` when both runs land in the same wall-clock
            #   second (the timestamp byte-equals and there's no diff at all).
            # - `diff_lines == 2` when the second run crosses a second boundary
            #   and the single `<generated ... />` line swaps, producing one
            #   `<` line and one `>` line.
            # Anything else (1, 3, 4+) means a non-timestamp byte differs
            # between runs — a determinism regression.
            diff_lines=$(diff /tmp/a.html /tmp/b.html | grep -cE '^[<>]' || true)
            echo "diff lines: $diff_lines"
            if [ "$diff_lines" -ne 0 ] && [ "$diff_lines" -ne 2 ]; then
              echo "DETERMINISM FAILURE: diff_lines=$diff_lines (expected 0 or 2)" >&2
              diff /tmp/a.html /tmp/b.html | head -50 >&2
              exit 1
            fi
          else
            echo "SKIP: testdata/example2 not yet committed."
          fi

  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux/amd64
          - linux/arm64
          - darwin/amd64
          - darwin/arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Cross-compile ${{ matrix.target }}
        env:
          CGO_ENABLED: "0"
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          os="${TARGET%%/*}"
          arch="${TARGET##*/}"
          out="/tmp/my-gather-${os}-${arch}"
          GOOS="$os" GOARCH="$arch" \
            go build -trimpath -o "$out" ./cmd/my-gather
          ls -lh "$out"
          file "$out" || true

  release:
    name: build release artifacts
    runs-on: ubuntu-latest
    needs: [test, lint, determinism, cross-compile]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: make release
        run: make release
      - uses: actions/upload-artifact@v4
        with:
          name: my-gather-dist
          path: dist/
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2.0.8
        with:
          files: |
            dist/my-gather_*.tar.gz
            dist/my-gather-darwin-amd64
            dist/my-gather-darwin-arm64
            dist/my-gather-linux-amd64
            dist/my-gather-linux-arm64
            dist/SHA256SUMS
