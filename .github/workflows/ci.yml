name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

#
# Job dependency graph (kept here so the YAML reads top-to-bottom
# in execution order):
#
#   lint    ──┐
#   test    ──┼──► determinism   ──┐
#   worker  ──┤                    ├──► release ──► publish-release (tags only)
#             └──► cross-compile ──┘
#
# - lint, test, and worker start in parallel from the worker pool (no `needs:`).
# - determinism and cross-compile both wait for test to pass; they
#   would otherwise duplicate the test job's compile work and consume
#   runner minutes for nothing if the unit tests were broken.
# - release waits for all four to be green.
#
# Module caching is handled by actions/setup-go@v5 (`cache: true` is
# the default; we set it explicitly so the contract is visible).
#
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true
      - name: constitution guard
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF" --depth=1
          CONSTITUTION_GUARD_CI=1 \
          CONSTITUTION_GUARD_RANGE="origin/$BASE_REF..HEAD" \
            scripts/hooks/pre-push-constitution-guard.sh
      - name: go vet
        run: go vet ./...
      - name: go test (incl. tests/coverage gates)
        env:
          CGO_ENABLED: "0"
        # `go test -count=1 ./...` exercises tests/coverage/... without
        # cache reuse, so mechanical constitution gates that inspect the
        # current worktree always run.
        run: go test -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: make lint
        run: make lint

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: feedback-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: feedback-worker/package-lock.json
      - name: npm ci
        run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: test
        run: npm test

  determinism:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -o bin/my-gather ./cmd/my-gather
      - name: Determinism round-trip
        run: |
          set -euo pipefail
          if [ -d testdata/example2 ]; then
            ./bin/my-gather --out /tmp/a.html --overwrite testdata/example2
            ./bin/my-gather --out /tmp/b.html --overwrite testdata/example2
            diff -u /tmp/a.html /tmp/b.html
          else
            echo "SKIP: testdata/example2 not yet committed."
          fi

  cross-compile:
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux/amd64
          - linux/arm64
          - darwin/amd64
          - darwin/arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Cross-compile ${{ matrix.target }}
        env:
          CGO_ENABLED: "0"
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          os="${TARGET%%/*}"
          arch="${TARGET##*/}"
          out="/tmp/my-gather-${os}-${arch}"
          GOOS="$os" GOARCH="$arch" \
            go build -trimpath -o "$out" ./cmd/my-gather
          ls -lh "$out"
          file "$out" || true

  release:
    name: build release artifacts
    runs-on: ubuntu-latest
    needs: [test, lint, worker, determinism, cross-compile]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: make release
        run: make release
      - name: verify release reproducibility
        run: |
          set -euo pipefail
          cp dist/SHA256SUMS /tmp/SHA256SUMS.first
          make release
          diff -u /tmp/SHA256SUMS.first dist/SHA256SUMS
      - name: Smoke-test native release binary
        run: ./dist/my-gather-linux-amd64 --version
      - uses: actions/upload-artifact@v4
        with:
          name: my-gather-dist
          path: dist/

  publish-release:
    name: publish release artifacts
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: my-gather-dist
          path: dist/
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2.0.8
        with:
          files: |
            dist/my-gather_*.tar.gz
            dist/my-gather-darwin-amd64
            dist/my-gather-darwin-arm64
            dist/my-gather-linux-amd64
            dist/my-gather-linux-arm64
            dist/SHA256SUMS
